apiVersion: machinelearning.seldon.io/v1
kind: SeldonDeployment

metadata:
  name: churn-custom
  namespace: ml-production

spec:
  name: churn-custom

  predictors:
  - name: default
    replicas: 1

    graph:
      name: churn-model
      type: MODEL
      endpoint:
        type: REST

    componentSpecs:
    - spec:
        containers:
        - name: churn-model
          image: 112277641321.dkr.ecr.us-east-1.amazonaws.com/churn-model:seldonfix
          imagePullPolicy: Always

          env:
          - name: PREDICTIVE_UNIT_SERVICE_PORT
            value: "8080"

          ports:
          - containerPort: 8080
            name: http

          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60

          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20