name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  test-and-build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Train Model
        run: |
          python train.py

      - name: Run Tests
        run: |
          pytest tests/ -v

      - name: Build Docker Image
        run: |
          docker build -t churn-model:test .