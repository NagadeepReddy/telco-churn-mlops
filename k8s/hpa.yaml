# ── k8s/hpa.yaml ──────────────────────────────────────────────────────────────
# HorizontalPodAutoscaler — automatically adds/removes pods
#
# Rules:
#   - Never go below 2 pods (always HA)
#   - Never go above 8 pods (cost control)
#   - Scale UP when average CPU hits 70%
#   - Scale DOWN after 5 minutes of low CPU (avoids rapid up/down)
#
# Apply:
#   kubectl apply -f k8s/hpa.yaml -n ml-production
#
# Check:
#   kubectl get hpa -n ml-production
#
# Watch it work (send traffic with load-test.sh, watch replicas change):
#   kubectl describe hpa churn-model-hpa -n ml-production
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: churn-model-hpa
  namespace: ml-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: churn-model-v1

  minReplicas: 2
  maxReplicas: 8

  metrics:
    # Scale on CPU
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # Scale on memory
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

  behavior:
    # Scale UP: add 2 pods at once, wait 60s between events
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60

    # Scale DOWN: remove 1 pod, wait 5 min — prevents ping-pong scaling
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---
# PodDisruptionBudget — ensures at least 1 pod is always running
# even during node maintenance or rolling updates
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: churn-model-pdb
  namespace: ml-production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: churn-model
