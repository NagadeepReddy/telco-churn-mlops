apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-model-v2
  namespace: ml-production
  labels:
    app: churn-model
    version: v2
    team: mlops

spec:
  replicas: 1

  selector:
    matchLabels:
      app: churn-model
      version: v2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

  template:
    metadata:
      labels:
        app: churn-model
        version: v2
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"

    spec:
      containers:
        - name: churn-model

          image: 112277641321.dkr.ecr.us-east-1.amazonaws.com/churn-model:v2

          imagePullPolicy: Always

          ports:
            - containerPort: 8080
              name: http
              protocol: TCP

          env:
            - name: MODEL_VERSION
              value: "v2"

            - name: MODEL_PATH
              value: "model/churn_model.pkl"

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: churn-model

      terminationGracePeriodSeconds: 30